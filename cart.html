<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Shopping cart for Kairali Furniture. Review your items, manage quantity, and checkout securely." />
  <title>Kairali Furniture | Shopping Cart</title>
  <link rel="stylesheet" href="assets/css/style.css" />
</head>
<body class="dark" data-page="cart">
  <header class="topbar glass">
    <div class="container topbar-inner">
      <a href="index.html" class="brand">Kairali<span>Furniture</span></a>
      <nav class="nav-menu">
        <a href="index.html">Home</a>
        <a href="product.html?id=sofa-01">Shop</a>
      </nav>
      <div class="topbar-actions">
        <button class="icon-button" id="themeToggle" aria-label="Toggle theme">☀️</button>
      </div>
    </div>
  </header>

  <main class="section cart-section">
    <div class="container">
      <div class="section-head">
        <span>Your Cart</span>
        <h2>Review Your Items</h2>
      </div>
      <div class="cart-grid">
        <div id="cartItems" class="cart-items"></div>
        <aside class="cart-summary glass-panel">
          <h3>Order Summary</h3>
          <p>Subtotal: <span id="cartSubtotal">₹0</span></p>
          <p>Estimated Shipping: <span id="cartShipping">₹299</span></p>
          <p class="cart-total">Total: <span id="cartTotal">₹0</span></p>
          <a href="checkout.html" class="button button-primary">Proceed to Checkout</a>
          <a href="index.html" class="button button-secondary">Continue Shopping</a>
        </aside>
      </div>
    </div>
  </main>

  <footer class="footer glass-panel">
    <div class="container footer-inner">
      <p>© 2026 Kairali Furniture. Karinkallathani luxury furniture store.</p>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script type="module" src="assets/js/app.js"></script>
</body>
</html>

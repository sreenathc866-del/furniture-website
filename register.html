<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Register a new account at Kairali Furniture to save addresses, wishlist products, and track orders." />
  <title>Kairali Furniture | Register</title>
  <link rel="stylesheet" href="assets/css/style.css" />
</head>
<body class="dark" data-page="auth">
  <main class="section auth-section">
    <div class="auth-panel glass-panel">
      <h1>Create Your Account</h1>
      <p>Join Kairali Furniture for personalized shopping and order management.</p>
      <form id="registerForm" class="auth-form">
        <div class="form-group">
          <label for="registerName">Full Name</label>
          <input type="text" id="registerName" placeholder="Your full name" required />
        </div>
        <div class="form-group">
          <label for="registerEmail">Email</label>
          <input type="email" id="registerEmail" placeholder="you@example.com" required />
        </div>
        <div class="form-group">
          <label for="registerPassword">Password</label>
          <input type="password" id="registerPassword" placeholder="Create a password" required />
        </div>
        <button type="submit" class="button button-primary">Register</button>
      </form>
      <p class="auth-switch">Already have an account? <a href="login.html">Login</a></p>
    </div>
  </main>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script type="module" src="assets/js/app.js"></script>
</body>
</html>

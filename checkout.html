<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Checkout securely with Kairali Furniture. Enter shipping details, review your order, and confirm purchase." />
  <title>Kairali Furniture | Checkout</title>
  <link rel="stylesheet" href="assets/css/style.css" />
</head>
<body class="dark" data-page="checkout">
  <header class="topbar glass">
    <div class="container topbar-inner">
      <a href="index.html" class="brand">Kairali<span>Furniture</span></a>
      <nav class="nav-menu">
        <a href="cart.html">Cart</a>
        <a href="index.html">Home</a>
      </nav>
      <div class="topbar-actions">
        <button class="icon-button" id="themeToggle" aria-label="Toggle theme">☀️</button>
      </div>
    </div>
  </header>

  <main class="section checkout-section">
    <div class="container checkout-grid">
      <div class="glass-panel checkout-form-panel">
        <div class="section-head">
          <span>Checkout</span>
          <h2>Complete Your Order</h2>
        </div>
        <form id="checkoutForm" class="checkout-form">
          <div class="form-group">
            <label for="fullName">Full Name</label>
            <input type="text" id="fullName" placeholder="Your full name" required />
          </div>
          <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" placeholder="you@example.com" required />
          </div>
          <div class="form-group">
            <label for="phone">Phone</label>
            <input type="tel" id="phone" placeholder="+91 98765 43210" required />
          </div>
          <div class="form-group">
            <label for="address">Shipping Address</label>
            <textarea id="address" rows="4" placeholder="Enter your delivery address" required></textarea>
          </div>
          <div class="form-group grid-2">
            <div>
              <label for="city">City</label>
              <input type="text" id="city" placeholder="Edappal" required />
            </div>
            <div>
              <label for="pincode">Pincode</label>
              <input type="text" id="pincode" placeholder="679584" required />
            </div>
          </div>
          <button type="submit" class="button button-primary">Confirm Order</button>
        </form>
      </div>
      <aside class="glass-panel order-summary-panel">
        <h3>Order Summary</h3>
        <div id="checkoutItems" class="checkout-items"></div>
        <div class="summary-lines">
          <div><span>Subtotal</span><span id="checkoutSubtotal">₹0</span></div>
          <div><span>Shipping</span><span>₹299</span></div>
          <div class="summary-total"><span>Total</span><span id="checkoutTotal">₹0</span></div>
        </div>
      </aside>
    </div>
  </main>

  <footer class="footer glass-panel">
    <div class="container footer-inner">
      <p>© 2026 Kairali Furniture. Luxury furniture delivered across Kerala.</p>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script type="module" src="assets/js/app.js"></script>
</body>
</html>

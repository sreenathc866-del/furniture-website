<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Login to your Kairali Furniture account for order history, wishlist, and profile management." />
  <title>Kairali Furniture | Login</title>
  <link rel="stylesheet" href="assets/css/style.css" />
</head>
<body class="dark" data-page="auth">
  <main class="section auth-section">
    <div class="auth-panel glass-panel">
      <h1>Welcome Back</h1>
      <p>Login to manage your orders, wishlist and profile.</p>
      <form id="loginForm" class="auth-form">
        <div class="form-group">
          <label for="loginEmail">Email</label>
          <input type="email" id="loginEmail" placeholder="you@example.com" required />
        </div>
        <div class="form-group">
          <label for="loginPassword">Password</label>
          <input type="password" id="loginPassword" placeholder="••••••••" required />
        </div>
        <button type="submit" class="button button-primary">Login</button>
      </form>
      <p class="auth-switch">Don’t have an account? <a href="register.html">Register now</a></p>
    </div>
  </main>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script type="module" src="assets/js/app.js"></script>
</body>
</html>
